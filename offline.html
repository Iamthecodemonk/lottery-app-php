<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Blue Extra Lotto</title>
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="/lt/public/assets/img/logo_1.png" />
  <link rel="stylesheet" href="/lt/public/assets/css/styles.css" />
</head>

<body class="min-h-screen bg-shell font-body text-ink">
  <div class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-lg w-full rounded-[2rem] border border-white/10 bg-white/5 px-6 py-10 text-center shadow-panel backdrop-blur-xl">
      <img src="/lt/public/assets/img/logo_1.png" alt="Blue Extra Lotto" class="mx-auto h-14 w-14 rounded-full" />
      <h1 class="mt-5 font-display text-3xl font-bold">You're offline</h1>
      <p class="mt-3 text-sm leading-6 text-muted">
        Check your internet connection and try again. We'll reconnect as soon as you are back online.
      </p>
      <button class="action-button mt-6" type="button" onclick="window.location.reload()">
        Retry Connection
      </button>
    </div>
  </div>
</body>

</html>
